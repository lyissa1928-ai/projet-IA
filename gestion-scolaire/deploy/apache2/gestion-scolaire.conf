# Configuration Apache2 pour Gestion Scolaire
# À placer dans /etc/apache2/sites-available/
# Puis : sudo a2ensite gestion-scolaire && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName gestion-scolaire.local
    # Remplacer par votre domaine : ServerName www.votredomaine.com

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/gestion-scolaire-error.log
    CustomLog ${APACHE_LOG_DIR}/gestion-scolaire-access.log combined

    ProxyPreserveHost On

    # IMPORTANT : /api/v1 doit être défini AVANT / (ordre des ProxyPass)
    # Proxy vers l'API NestJS (port 3001)
    ProxyPass /api/v1 http://127.0.0.1:3001/api/v1
    ProxyPassReverse /api/v1 http://127.0.0.1:3001/api/v1

    # Proxy vers l'application Next.js (port 3000)
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
</VirtualHost>

