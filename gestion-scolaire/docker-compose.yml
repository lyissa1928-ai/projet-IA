services:
  db:
    image: postgres:16-alpine
    container_name: gestion-scolaire-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: scolarite
      POSTGRES_PASSWORD: scolarite
      POSTGRES_DB: gestion_scolaire
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scolarite -d gestion_scolaire"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
