services:
  postgres:
    image: postgres:16-alpine
    container_name: agriculture-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agriculture
      POSTGRES_PASSWORD: agriculture
      POSTGRES_DB: agriculture
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agriculture -d agriculture"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agriculture-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MQTT (optionnel - commenter si non utilisé)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: agriculture-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    profiles:
      - mqtt

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: agriculture-network
