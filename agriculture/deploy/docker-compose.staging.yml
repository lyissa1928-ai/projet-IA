services:
  postgres:
    image: postgres:16-alpine
    container_name: agriculture-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agriculture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-agriculture}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agriculture} -d ${POSTGRES_DB:-agriculture}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agriculture-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: agriculture-api
    restart: always
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agriculture}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agriculture}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: agriculture-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:4000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
